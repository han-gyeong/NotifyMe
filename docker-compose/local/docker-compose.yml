services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: dev-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    ports:
      - "2181:2181"
    networks:
      - dev-net

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: dev-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "dev-zookeeper:2181"

      # 호스트(로컬) 접속
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"

      # 단일 브로커 로컬용 필수 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - dev-net

  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "gksrud12" # root 비밀번호
      MYSQL_DATABASE: "notifyme"     # 초기 생성 데이터베이스 이름
      MYSQL_USER: "notifyme"         # 일반 유저명
      MYSQL_PASSWORD: "gksrud12"  # 일반 유저 비밀번호
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dev-net

  redis:
    image: redis:7
    container_name: dev-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - dev-net

  prometheus:
    image: prom/prometheus
    container_name: dev-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus # 메트릭 데이터 저장 장소
    ports:
      - "9090:9090"
    networks:
      - dev-net

  grafana:
    image: grafana/grafana
    container_name: dev-grafana
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - dev-net

networks:
  dev-net:
    name: dev-net

volumes:
  redis-data:
  mysql-data:
  prometheus-data:
  grafana-data: