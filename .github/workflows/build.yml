name: build.yml
on:
  push:
    branches:
      - main
    paths:
      - 'notification-api/**'
      - 'notification-auth/**'
      - 'notification-core/**'
      - 'notification-eureka/**'
      - 'notification-gateway/**'
      - 'notification-scheduler/**'
      - 'notification-sender/**'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      auth: ${{ steps.filter.outputs.auth }}
      core: ${{ steps.filter.outputs.core }}
      eureka: ${{ steps.filter.outputs.eureka }}
      gateway: ${{ steps.filter.outputs.gateway }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
      sender: ${{ steps.filter.outputs.sender }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api: 'notification-api/**'
            auth: 'notification-auth/**'
            core: 'notification-core/**'
            eureka: 'notification-eureka/**'
            gateway: 'notification-gateway/**'
            scheduler: 'notification-scheduler/**'
            sender: 'notification-sender/**'

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        run: |
          ./gradlew :notification-api:bootJar
          docker build -t imoniz/notifyme:api-latest ./notification-api
          docker push imoniz/notifyme:api-latest

  build-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        run: |
          ./gradlew :notification-auth:bootJar
          docker build -t imoniz/notifyme:auth-latest ./notification-auth
          docker push imoniz/notifyme:auth-latest

  build-eureka:
    needs: detect-changes
    if: needs.detect-changes.outputs.eureka == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        run: |
          ./gradlew :notification-eureka:bootJar
          docker build -t imoniz/notifyme:eureka-latest ./notification-eureka
          docker push imoniz/notifyme:eureka-latest

  build-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        run: |
          ./gradlew :notification-gateway:bootJar
          docker build -t imoniz/notifyme:gateway-latest ./notification-gateway
          docker push imoniz/notifyme:gateway-latest

  build-scheduler:
    needs: detect-changes
    if: needs.detect-changes.outputs.scheduler == 'true' || needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        run: |
          ./gradlew :notification-scheduler:bootJar
          docker build -t imoniz/notifyme:scheduler-latest ./notification-scheduler
          docker push imoniz/notifyme:scheduler-latest

  build-sender:
    needs: detect-changes
    if: needs.detect-changes.outputs.sender == 'true' || needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        run: |
          ./gradlew :notification-sender:bootJar
          docker build -t imoniz/notifyme:sender-latest ./notification-sender
          docker push imoniz/notifyme:sender-latest