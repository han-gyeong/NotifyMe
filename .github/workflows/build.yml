name: build.yml

on:
  push:
    branches:
      - master
    paths:
      - 'notification-api/**'
      - 'notification-auth/**'
      - 'notification-core/**'
      - 'notification-eureka/**'
      - 'notification-gateway/**'
      - 'notification-scheduler/**'
      - 'notification-sender/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      auth: ${{ steps.filter.outputs.auth }}
      core: ${{ steps.filter.outputs.core }}
      eureka: ${{ steps.filter.outputs.eureka }}
      gateway: ${{ steps.filter.outputs.gateway }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
      sender: ${{ steps.filter.outputs.sender }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api: 'notification-api/**'
            auth: 'notification-auth/**'
            core: 'notification-core/**'
            eureka: 'notification-eureka/**'
            gateway: 'notification-gateway/**'
            scheduler: 'notification-scheduler/**'
            sender: 'notification-sender/**'

  build-api:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Test and Build
        working-directory: notification-api
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        uses: ./.github/actions/ecr-build-push
        with:
          service_path: notification-api
          ecr_repository: notifyme/api

  build-auth:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Test and Build
        working-directory: notification-auth
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        uses: ./.github/actions/ecr-build-push
        with:
          service_path: notification-auth
          ecr_repository: notifyme/auth

  build-eureka:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.eureka == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Test and Build
        working-directory: notification-eureka
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        uses: ./.github/actions/ecr-build-push
        with:
          service_path: notification-eureka
          ecr_repository: notifyme/eureka

  build-gateway:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Test and Build
        working-directory: notification-gateway
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        uses: ./.github/actions/ecr-build-push
        with:
          service_path: notification-gateway
          ecr_repository: notifyme/gateway

  build-scheduler:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.scheduler == 'true' || needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Test and Build
        working-directory: notification-scheduler
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        uses: ./.github/actions/ecr-build-push
        with:
          service_path: notification-scheduler
          ecr_repository: notifyme/scheduler

  build-sender:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.sender == 'true' || needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Test and Build
        working-directory: notification-sender
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        uses: ./.github/actions/ecr-build-push
        with:
          service_path: notification-sender
          ecr_repository: notifyme/sender
