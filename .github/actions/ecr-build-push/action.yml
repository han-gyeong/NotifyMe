name: ECR Build Push
description: Build a Docker image for a service directory and push it to ECR.

inputs:
  service_path:
    description: Service directory that contains the Dockerfile.
    required: true
  ecr_repository:
    description: ECR repository name for the service image.
    required: true

runs:
  using: composite
  steps:
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      shell: bash
      run: |
        docker build \
          -t ${{ inputs.ecr_repository }}:${{ github.sha }} \
          ./${{ inputs.service_path }}

    - name: Tag Docker image
      shell: bash
      run: |
        docker tag \
          ${{ inputs.ecr_repository }}:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ github.sha }}

    - name: Push ECR image
      shell: bash
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ github.sha }}
