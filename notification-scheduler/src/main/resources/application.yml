notification:
  scheduler:
    id: 1
    lock-until-minutes: 5
  topics:
    request:
      EMAIL: notification.email.send-request
      SLACK: notification.slack.send-request
    result:
      EMAIL: notification.email.send-response
      SLACK: notification.slack.send-response

spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
  datasource:
    url: jdbc:mysql://localhost:3307/notifyme
    username: root
    password: gksrud12
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false