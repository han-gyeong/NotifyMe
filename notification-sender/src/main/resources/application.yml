spring:
  application:
    name: notification-sender-${sender.type}
  profiles:
    active: local

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: "kr.notifyme.notification.sender.dto.SendRequest"

slack:
  webhook-url: ${SLACK_WEBHOOK_URL}

mail:
  from: webmaster@notifyme.kr
  host: ${SMTP_SERVER}
  port: 587
  username: ${SMTP_USERNAME}
  password: ${SMTP_PASSWORD}

sender:
  type: ${TYPE}

notification:
  channels:
    EMAIL:
      topic-request: notification.email.send-request
      topic-result: notification.common.send-result
      group-id: email-sender-group
      concurrency: 5
    SLACK:
      topic-request: notification.slack.send-request
      topic-result: notification.common.send-result
      group-id: slack-sender-group
      concurrency: 5

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    tags:
      application: ${spring.application.name}