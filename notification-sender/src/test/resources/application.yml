spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mail:
  port: 3025
  helo-host: mail.notifyme.kr
  mail-from: alert@notifyme.kr
  connect-timeout: 5
  read-timeout: 5

sender:
  type: ${TYPE}

notification:
  channels:
    EMAIL:
      topic-request: notification.email.send-request
      topic-result: notification.email.send-result
      group-id: email-sender-group
      concurrency: 5
    SLACK:
      topic-request: notification.slack.send-request
      topic-result: notification.slack.send-result
      group-id: slack-sender-group
      concurrency: 5

